services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
      POSTGRES_DB: poker
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker -d poker"]
      interval: 3s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: '4'

  # One-shot container: pulls qwen3:8b then exits.
  ollama-pull:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen3:4b"]
    depends_on:
      ollama:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build: .
    image: poker-trainer:latest
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Secrets (Google OAuth client, session secret) come from .env (gitignored).
    # See .env.example. DATABASE_URL falls back here if not set in .env.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://poker:poker@db:5432/poker
      OLLAMA_BASE_URL: http://ollama:11434
      REDIS_URL: redis://redis:6379
      LOG_DIR: /app/logs
      LOG_LEVEL: INFO
      LOG_JSON: "1"
    # Run the web app with hot-reload for development.
    command: >
      uv run uvicorn poker_trainer.main:app
      --host 0.0.0.0 --port 8000 --reload --app-dir src
    # Mount source for live editing during development. The container's
    # /app/.venv is kept separate (anonymous volume) so the host's lack of a
    # Linux venv doesn't shadow the one built in the image.
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - /app/.venv
      - ./logs:/app/logs
    ports:
      - "8000:8000"

  worker:
    build: .
    image: poker-trainer:latest
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://poker:poker@db:5432/poker
      OLLAMA_BASE_URL: http://ollama:11434
      REDIS_URL: redis://redis:6379
      LOG_DIR: /app/logs
      LOG_LEVEL: INFO
      LOG_JSON: "1"
    # Runs the game-evaluation background pipeline (Stage 4 of the coach agent).
    command: uv run arq poker_trainer.worker.WorkerSettings
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - /app/.venv
      - ./logs:/app/logs

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

  jupyter:
    build: .
    image: poker-trainer:latest
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://poker:poker@db:5432/poker
      LOG_DIR: /app/logs
      LOG_LEVEL: INFO
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --app-dir src
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./notebooks:/app/notebooks
      - /app/.venv
      - ./logs:/app/logs
    ports:
      - "8888:8888"
    profiles:
      - jupyter

volumes:
  pgdata:
  ollama_data:

